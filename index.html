<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Liquid League Tracker Pro</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://js.puter.com/v2/"></script>
</head>
<body>

    <div class="liquid-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="blob blob-4"></div>
    </div>

    <div class="app-container">
        
        <div class="player-card" id="p1-card">
            <div class="player-header" id="p1-header-wrapper">
                <span class="player-name" id="p1-name-display" onclick="renamePlayer(0)">Spieler 1</span>
                <span class="comeback-badge" id="p1-comeback-badge" style="display: none;">🔥 <span class="comeback-count" id="p1-comeback-txt">0</span></span>
            </div>
            <div class="score-difference" id="p1-score-diff">=</div>
            
            <div class="counter-wrapper">
                <div class="current-wins-display" id="p1-display">0</div>
                <div class="btn-label">
                    <div class="league-icon bronze-glow"></div> Current League Status
                </div>
                <div class="controls">
                    <button class="btn btn-minus" onclick="modifyScore(0, -1)">−</button>
                    <button class="btn btn-plus" onclick="modifyScore(0, 1)">+</button>
                </div>
            </div>
            
            <div id="p1-leagues" class="league-stack">
                </div>
        </div>

        <div class="player-card" id="p2-card">
            <div class="player-header" id="p2-header-wrapper">
                <span class="player-name" id="p2-name-display" onclick="renamePlayer(1)">Spieler 2</span>
                <span class="comeback-badge" id="p2-comeback-badge" style="display: none;">🔥 <span class="comeback-count" id="p2-comeback-txt">0</span></span>
            </div>
            <div class="score-difference" id="p2-score-diff">=</div>
            
            <div class="counter-wrapper">
                <div class="current-wins-display" id="p2-display">0</div>
                <div class="btn-label">
                    <div class="league-icon bronze-glow"></div> Current League Status
                </div>
                <div class="controls">
                    <button class="btn btn-minus" onclick="modifyScore(1, -1)">−</button>
                    <button class="btn btn-plus" onclick="modifyScore(1, 1)">+</button>
                </div>
            </div>
            
            <div id="p2-leagues" class="league-stack">
                </div>
        </div>

    </div>

    <div class="dynamic-island-container">
        <div class="dynamic-island" id="main-island">
            <button class="island-btn" onclick="togglePopup('settings-popup')" title="Einstellungen">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </button>
            
            <div class="ai-orb-wrapper" onclick="togglePopup('ai-popup')">
                <div class="ai-orb status-idle" id="ai-visual-orb">
                    <div class="orb-core"></div>
                </div>
            </div>

            <button class="island-btn" onclick="togglePopup('audio-popup')" title="Audio Management">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
            </button>
        </div>
    </div>

    <div class="popup-overlay" id="settings-popup">
        <div class="popup-content">
            <h2>System-Einstellungen</h2>
            <div class="settings-group">
                <label>Design-Modus</label>
                <button class="popup-btn theme-toggle-btn" onclick="toggleTheme()">Theme umschalten (Dark/Light)</button>
            </div>
            <div class="settings-group">
                <label>Aktive Spiel-ID (Supabase)</label>
                <input type="text" id="game-id-input" class="popup-input" placeholder="Lade automatischen Slot..." readonly>
            </div>
            <button class="popup-close-btn" onclick="closeAllPopups()">Fertig</button>
        </div>
    </div>

    <div class="popup-overlay" id="audio-popup">
        <div class="popup-content">
            <h2>Audio Management Dashboard</h2>
            <p style="font-size: 0.8rem; opacity: 0.7; margin-bottom: 15px;">Lade benutzerdefinierte Sounds direkt in die Cloud. Unterstützt Drag-and-Drop oder Auswahl.</p>
            
            <div class="audio-upload-row">
                <div class="audio-box">
                    <span class="audio-title">Standard Sieg</span>
                    <input type="file" id="sound-win-file" accept="audio/*" onchange="handleAudioUpload(this, 'win')" style="display:none">
                    <button class="popup-btn-small" onclick="document.getElementById('sound-win-file').click()">Datei wählen</button>
                    <button class="popup-btn-play" onclick="playCustomSound('win')">▶ Testen</button>
                </div>
                <div class="audio-box">
                    <span class="audio-title">Promotion</span>
                    <input type="file" id="sound-promoted-file" accept="audio/*" onchange="handleAudioUpload(this, 'promoted')" style="display:none">
                    <button class="popup-btn-small" onclick="document.getElementById('sound-promoted-file').click()">Datei wählen</button>
                    <button class="popup-btn-play" onclick="playCustomSound('promoted')">▶ Testen</button>
                </div>
                <div class="audio-box">
                    <span class="audio-title">Comeback</span>
                    <input type="file" id="sound-comeback-file" accept="audio/*" onchange="handleAudioUpload(this, 'comeback')" style="display:none">
                    <button class="popup-btn-small" onclick="document.getElementById('sound-comeback-file').click()">Datei wählen</button>
                    <button class="popup-btn-play" onclick="playCustomSound('comeback')">▶ Testen</button>
                </div>
            </div>
            <button class="popup-close-btn" onclick="closeAllPopups()" style="margin-top: 20px;">Schließen</button>
        </div>
    </div>

    <div class="popup-overlay" id="ai-popup">
        <div class="popup-content">
            <h2>KI Live-Kommentator & Sprachausgabe</h2>
            
            <div class="settings-group">
                <label>Kommentator-Persönlichkeit</label>
                <div class="mode-toggle-group">
                    <button id="mode-pro" class="mode-btn active" onclick="setAIMode('professional')">Professionell</button>
                    <button id="mode-trash" class="mode-btn" onclick="setAIMode('trash')">Trash Talk</button>
                </div>
            </div>

            <div class="settings-group">
                <label>System-Status</label>
                <input type="text" class="popup-input" value="Puter.js Cloud Engine Aktiv" readonly>
            </div>

            <div class="settings-group">
                <label>Text-to-Speech Stimme</label>
                <select id="tts-voice-select" class="popup-select">
                    </select>
            </div>

            <div class="settings-group-row">
                <div>
                    <label>Geschwindigkeit</label>
                    <input type="range" id="tts-rate" min="0.5" max="2" step="0.1" value="1.0" class="popup-slider">
                </div>
                <div>
                    <label>Tonhöhe</label>
                    <input type="range" id="tts-pitch" min="0.5" max="1.5" step="0.1" value="1.0" class="popup-slider">
                </div>
            </div>

            <button class="popup-close-btn" onclick="closeAllPopups()">Speichern & Beenden</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
