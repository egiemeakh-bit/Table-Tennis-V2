<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tischtennis Scoreboard - iOS 27 Glass</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Supabase JS SDK CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Puter.js CDN für KI-Generierung -->
    <script src="https://js.puter.com/v2/"></script>
</head>
<body>
    <!-- Dynamischer Liquid Background -->
    <div class="liquid-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="app-container">
        <!-- Dynamic Island / Header -->
        <header class="dynamic-island">
            <div class="status-indicator" id="db-status">
                <span class="dot"></span> Supabase bereit
            </div>
            <h1 class="match-title">Tischtennis Match</h1>
            <div class="server-badge" id="server-indicator">Aufschlag: Spieler 1</div>
        </header>

        <!-- Main Scoreboard -->
        <main class="scoreboard">
            <!-- Spieler 1 Card -->
            <div class="player-card" id="card-player-1">
                <div class="player-header">
                    <input type="text" id="player1-name" class="player-name-input" value="Spieler 1" />
                    <span class="service-dot" id="service-p1">🏓</span>
                </div>
                <div class="sets-display">Sätze: <span id="sets-p1">0</span></div>
                <div class="score-display" id="score-p1">0</div>
                <div class="controls">
                    <button class="btn btn-minus" onclick="modifyScore(0, -1)">-1</button>
                    <button class="btn btn-plus" onclick="modifyScore(0, 1)">+1</button>
                </div>
            </div>

            <!-- VS Divider -->
            <div class="vs-divider">VS</div>

            <!-- Spieler 2 Card -->
            <div class="player-card" id="card-player-2">
                <div class="player-header">
                    <input type="text" id="player2-name" class="player-name-input" value="Spieler 2" />
                    <span class="service-dot" id="service-p2" style="opacity: 0;">🏓</span>
                </div>
                <div class="sets-display">Sätze: <span id="sets-p2">0</span></div>
                <div class="score-display" id="score-p2">0</div>
                <div class="controls">
                    <button class="btn btn-minus" onclick="modifyScore(1, -1)">-1</button>
                    <button class="btn btn-plus" onclick="modifyScore(1, 1)">+1</button>
                </div>
            </div>
        </main>

        <!-- KI-Kommentator & Siri Orb Section -->
        <section class="commentator-section">
            <div class="ai-orb-container">
                <div class="ai-orb" id="ai-orb" onclick="testCommentator()"></div>
            </div>
            <div class="commentary-box">
                <div class="commentary-header">
                    <span class="ai-badge">iOS 27 Live KI</span>
                    <button id="tts-toggle-btn" class="btn-icon" onclick="toggleAudio()">🔊 Ton an</button>
                </div>
                <p id="commentary-text" class="commentary-text">Bereit für das Match. Klicke auf den Punkte-Button, um das Spiel zu starten!</p>
            </div>
        </section>

        <!-- Bottom Action Controls -->
        <footer class="action-bar">
            <button class="btn btn-secondary" onclick="undoScore()">Rückgängig</button>
            <button class="btn btn-secondary" onclick="resetMatch()">Match Reset</button>
            <button class="btn btn-primary" onclick="saveMatchToSupabase()">In Supabase Speichern</button>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="commentator.js"></script>
    <script src="app.js"></script>
</body>
</html>
